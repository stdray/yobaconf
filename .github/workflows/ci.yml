name: CI

on:
  push:
    branches: [main]
    tags: ['deploy']
  pull_request:

permissions:
  contents: read
  packages: write

# Deduplicate runs on the same SHA — e.g. when a push to `main` and a subsequent
# `git tag -f deploy && git push -f origin deploy` both point at the same commit.
# The later trigger cancels the earlier in-progress run and drives the deploy itself.
# For PRs, successive pushes to the same branch also cancel stale runs (free CI minutes).
concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ─── Fast lane: frontend checks + xUnit (PR-only) ───
  # On push to main / deploy tag the `publish` job re-runs tests via Cake's
  # DockerPush → DockerSmoke → Docker → Test dependency chain, so there's no need
  # to repeat the standalone `test` job on post-merge / release-tag events.
  test:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Bun install (frontend)
        working-directory: src/YobaConf.Web
        run: bun install --frozen-lockfile

      - name: English-only (user-facing files, spec §12)
        run: |
          set -e
          if grep -RPn '[^\x00-\x7F]' \
              src/YobaConf.Web/ts \
              src/YobaConf.Web/Pages \
              2>/dev/null; then
            echo "::error::Non-ASCII characters in user-facing files. English-only until i18n scaffold lands (spec §12)."
            exit 1
          fi

      - name: Biome check
        working-directory: src/YobaConf.Web
        run: bun run lint

      - name: TypeScript typecheck
        working-directory: src/YobaConf.Web
        run: bun run typecheck

      - name: Dotnet format verify
        run: |
          dotnet restore YobaConf.slnx
          dotnet format YobaConf.slnx --verify-no-changes --no-restore

      - name: Cake test target
        run: |
          chmod +x ./build.sh
          ./build.sh --target=Test

  # ─── Docker build + push to ghcr.io (on main pushes and deploy tag) ───
  # Cake's DockerPush chain runs Test internally, so no `needs: test` here — that job
  # only runs on PRs and `publish` only on push events, no overlap.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Cake DockerPush (build + smoke + push)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          ./build.sh --target=DockerPush --dockerPush=true --ghcrRepository=${{ github.repository }} --dockerTagOutput="$TAG_FILE"
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  # ─── Deploy via SSH (only on manual `deploy` tag push) ───
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          script: |
            set -euo pipefail
            IMAGE="ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.dockerTag }}"
            CONTAINER_NAME="yobaconf"
            # DEPLOY_USERNAME is in the `docker` group → no sudo for docker commands.
            # /opt/yobaconf/data is pre-created during host bootstrap with chown 1654:1654
            # (chiseled `app` UID) so the container can write its SQLite file on mount — see
            # doc/deploy.md. Public GHCR package → docker pull is anonymous.
            docker pull "$IMAGE"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            # Host port 8081 allocated per the shared-host convention documented in
            # infra/Caddyfile.fragment (8080 = yobapub, 8081 = yobaconf, 8082 = yobalog).
            # Only loopback bind — central Caddy terminates TLS on :443 and reverse-proxies
            # to 127.0.0.1:8081.
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 127.0.0.1:8081:8080 \
              -v /opt/yobaconf/data:/app/data \
              -e Admin__Username="${{ secrets.YOBACONF_ADMIN_USERNAME }}" \
              -e Admin__PasswordHash="${{ secrets.YOBACONF_ADMIN_PASSWORD_HASH }}" \
              -e YOBACONF_MASTER_KEY="${{ secrets.YOBACONF_MASTER_KEY }}" \
              -e YobaLog__ServerUrl="${{ secrets.YOBALOG_SERVER_URL }}" \
              -e YobaLog__ApiKey="${{ secrets.YOBALOG_API_KEY }}" \
              "$IMAGE"
            docker system prune -a -f
