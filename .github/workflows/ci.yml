name: CI

on:
  push:
    branches: [main]
    tags: ['deploy']
  pull_request:

permissions:
  contents: read
  packages: write

# Deduplicate runs on the same SHA — e.g. when a push to `main` and a subsequent
# `git tag -f deploy && git push -f origin deploy` both point at the same commit.
# The later trigger cancels the earlier in-progress run and drives the deploy itself.
# For PRs, successive pushes to the same branch also cancel stale runs (free CI minutes).
concurrency:
  group: ci-${{ github.sha }}
  cancel-in-progress: true

jobs:
  # ─── PR validation: lint + unit tests + E2E in one sequential job ───
  # Merged from separate `test` + `e2e` jobs: with NuGet + Playwright caches warm,
  # the setup + restore budget is tiny, so the old parallel gain is marginal while
  # one job means one runner, one cache fetch, one log, and lint failure cancels
  # the expensive E2E run early. Cake's CI target chains Test → E2ETest reusing
  # the Build output.
  #
  # On push to main / deploy tag the `publish` job re-runs unit tests via Cake's
  # DockerPush → DockerSmoke → Docker → Test dependency chain, so this job is
  # PR-only and post-merge runs trust the PR gate.
  ci:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # NuGet package cache — biggest win on cold miss. Key on any csproj + central
      # package versions + global.json; any add/upgrade/SDK-bump forces a fresh restore.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # Playwright Chromium (~170MB). Key on Directory.Packages.props so
      # Microsoft.Playwright version bumps invalidate cleanly.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # All lint / verify rules live in build.cake — the Cake `CI` target depends on
      # `Lint` (inline-script gate + English-only + Biome + tsc + dotnet format) then
      # `Test` + `E2ETest`. ci.yml only sets up the runner environment; the Cake DAG
      # decides what runs and in what order. `bun install --frozen-lockfile` is a
      # `FrontendInstall` Cake task pulled in by FrontendLint / FrontendTypecheck.
      - name: Cake CI target (Lint + Test + E2E)
        run: |
          chmod +x ./build.sh
          ./build.sh --target=CI

      - name: Upload trace artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: tests/YobaConf.E2ETests/bin/**/artifacts/*.zip
          if-no-files-found: ignore

  # ─── Docker build + push to ghcr.io (main pushes + deploy tag) ───
  # Cake's DockerPush chain covers Test and E2ETest — self-contained pipeline.
  # `ci` job only runs on PRs and `publish` only on push events, no overlap.
  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      dockerTag: ${{ steps.publish.outputs.dockerTag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      # DockerPush chain includes E2ETest → Chromium download via playwright.ps1.
      # Shared cache key with the PR-only ci job; bumps when Microsoft.Playwright
      # version changes in Directory.Packages.props.
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      # buildx with the docker-container driver is required for `type=gha` cache
      # export — default docker daemon only supports inline/registry cache backends.
      # Cake's DockerBuildXBuild invokes the active builder, so no explicit name
      # plumbing is needed; `setup-buildx-action` sets the created builder as default.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # --dockerCacheFrom/To=type=gha piggyback on actions/cache's GitHub-hosted
      # storage (distinct namespace from actions/cache keys — managed by buildx).
      # mode=max includes all intermediate layers, not just the final image — bigger
      # cache, faster incremental builds since restore+publish layers are reusable
      # as long as csproj/package-lock/COPY'd source hasn't changed.
      - name: Cake DockerPush (build + smoke + push)
        id: publish
        run: |
          set -euo pipefail
          chmod +x ./build.sh
          TAG_FILE="$RUNNER_TEMP/docker-tag.txt"
          ./build.sh --target=DockerPush \
            --dockerPush=true \
            --ghcrRepository=${{ github.repository }} \
            --dockerTagOutput="$TAG_FILE" \
            --dockerCacheFrom=type=gha \
            --dockerCacheTo=type=gha,mode=max
          echo "dockerTag=$(cat "$TAG_FILE")" >> "$GITHUB_OUTPUT"

  # ─── Deploy via SSH (only on manual `deploy` tag push) ───
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/tags/deploy'
    needs: publish
    runs-on: ubuntu-latest
    steps:
      # Secrets go through appleboy/ssh-action's `envs:` passthrough, not
      # through inline `${{ secrets.X }}` expansion inside the script body.
      # Inline expansion trips bash variable expansion on any `$` in the
      # secret value — PBKDF2 hash is literally `pbkdf2$<iter>$<salt>$<hash>`,
      # so double-quoting substitutes `$<iter>` as positional param `$1`
      # under `set -u` and aborts the deploy. env-var passthrough side-steps
      # that: GH Actions puts the raw value into an env var, the action SCPs
      # the env to the remote shell, and bash references it through a shell
      # variable whose expanded content is not re-scanned for more dollars.
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          ADMIN_USER: ${{ secrets.YOBACONF_ADMIN_USERNAME }}
          ADMIN_PASS_HASH: ${{ secrets.YOBACONF_ADMIN_PASSWORD_HASH }}
          MASTER_KEY: ${{ secrets.YOBACONF_MASTER_KEY }}
          YOBALOG_URL: ${{ secrets.YOBALOG_SERVER_URL }}
          YOBALOG_KEY: ${{ secrets.YOBALOG_API_KEY }}
          OTEL_ENABLED: ${{ secrets.YOBACONF_OTEL_ENABLED }}
          OTLP_ENDPOINT: ${{ secrets.YOBACONF_OTLP_ENDPOINT }}
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USERNAME }}
          password: ${{ secrets.DEPLOY_PASSWORD }}
          envs: ADMIN_USER,ADMIN_PASS_HASH,MASTER_KEY,YOBALOG_URL,YOBALOG_KEY,OTEL_ENABLED,OTLP_ENDPOINT
          script: |
            set -euo pipefail
            IMAGE="ghcr.io/${{ github.repository }}:${{ needs.publish.outputs.dockerTag }}"
            CONTAINER_NAME="yobaconf"
            # DEPLOY_USERNAME is in the `docker` group -> no sudo for docker commands.
            # /opt/yobaconf/data is pre-created during host bootstrap with chown 1654:1654
            # (chiseled `app` UID) so the container can write its SQLite file on mount.
            # Public GHCR package -> docker pull is anonymous.
            docker pull "$IMAGE"
            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true
            # Host port 8081 per the shared-host convention (infra/Caddyfile.fragment).
            # Only loopback bind -- central Caddy terminates TLS and reverse-proxies.
            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              -p 127.0.0.1:8081:8080 \
              -v /opt/yobaconf/data:/app/data \
              -e Admin__Username="$ADMIN_USER" \
              -e Admin__PasswordHash="$ADMIN_PASS_HASH" \
              -e YOBACONF_MASTER_KEY="$MASTER_KEY" \
              -e YobaLog__ServerUrl="$YOBALOG_URL" \
              -e YobaLog__ApiKey="$YOBALOG_KEY" \
              -e OpenTelemetry__Enabled="$OTEL_ENABLED" \
              -e OpenTelemetry__OtlpEndpoint="$OTLP_ENDPOINT" \
              "$IMAGE"
            docker system prune -a -f

  # ─── NuGet publish on push to main ───
  nuget-publish:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', 'Directory.Packages.props', 'global.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Ensure build script is executable
        run: chmod +x ./build.sh

      - name: Publish NuGet package
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: ./build.sh --target=NuGetPush --configuration=Release

      - name: Upload NuGet artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages
          path: artifacts/*.nupkg
